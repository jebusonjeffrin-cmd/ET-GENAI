[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "phase_gate: functional-acceptance tests that require a real Ollama instance (see docs/TESTING.md)",
]

[tool.ruff]
line-length = 130
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
