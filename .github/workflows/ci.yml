name: CI

# Runs the unit + integration test suite (mocked LLM via FakeLLMClient) on every push/PR.
# This CANNOT run the phase-gate functional-acceptance checks — GitHub Actions has no
# GPU/Ollama. Those are manual, documented in docs/PROJECT_PLAN.md §6/§7, and run on
# whichever machine actually reaches a real Ollama instance. Green CI = logic is correct
# against known inputs. It is NOT the same thing as a phase being done.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inspiron
          POSTGRES_PASSWORD: inspiron
          POSTGRES_DB: inspiron_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/inspiron_test
        ports: ["7687:7687"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Unit + integration tests (FakeLLMClient — no Ollama in CI)
        env:
          DATABASE_URL: postgresql://inspiron:inspiron@localhost:5432/inspiron_test
          REDIS_URL: redis://localhost:6379/0
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: neo4j/inspiron_test
          LLM_BACKEND: fake
        run: pytest --cov=app --cov-report=term-missing -m "not phase_gate"

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --run
